<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create course</title>
    <Style>
        body{
      		margin: 0;
      		font-family: Arial, sans-serif;
      		background-color: #f3f1ee;
      		color: #222;
            	border: 20px;
        }
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    background-color: #ffffff;
    z-index: 1000;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    border-radius: 0 0 15px 15px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
}

.logo img {
    height: 40px;
    width: auto;
}

.logo h3 {
    margin: 0;
    color: black;
    font-size: 1.2rem;
}

.navbar ul {
    list-style: none;
}

.navbar .nav-links {
    display: flex;
    align-items: center;
    margin-right: 100px;
    gap: 5px;
}

.nav-link {
    text-decoration: none;
    color: black;
    padding: 15px 20px;
    display: inline-block;
    transition: background-color 0.3s;
}

.nav-link:hover {
    background-color: rgb(202, 201, 201);
}

.nav-link.active {
    background-color: #f8a928;
    color: white;
    font-weight: 600;
}

.nav-links img {
    height: 30px;
    width: 30px;
    border-radius: 50%;
}

        .create-layout{
            padding: 40px;
            max-width: 500px;
            margin: auto;
	    margin-top: 8rem;
        }

        input, select{
            padding: 8px;
            margin-bottom: 15px;
        }

        button{
            padding: 10px;
            margin-bottom: 10px;
        }

    </Style>
</head>
<body>
<nav class = "navbar">

    <div class = "logo">
        <a href="instructorDashboard.html">
	<img src="images/book.webp" id="logo">
	</a>
        <h3>Smart Course Companion</h3>
    </div>

    <ul class = "nav-links">
        <li><a href="instructorDashboard.html" class="nav-link">Home</a></li>
        <li><a href="InstructorCreateClassPage.html" class="nav-link">Add a class</a></li>
        <li><a href="index.html" class="nav-link">Logout</a></li>
        <li><a href="instructormanageaccountpage.html"> <img src = "images/icon.webp" alt = "User Icon"></a></li>
    </ul>

</nav>

    <main class="create-layout">

    <h2>Create new course</h2>

    <label>Course Code</label>
    <input type="text"> 

    <label>Term</label>
    <select>
        <option>Winter 2026</option>
        <option>Summer 2026</option>
        <option>Fall 2026</option>
    </select>

    <button type="button"
    onclick="window.location.href='InstructorDashboard.html'">
    create
    </button>
    
</body>
</html>
