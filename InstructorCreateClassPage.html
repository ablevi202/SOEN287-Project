<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Course</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f3f1ee;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background-color: white;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.logo {
    font-weight: bold;
}

.nav-links {
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: black;
    font-weight: 500;
}

/* PAGE */
.container {
    margin-top: 120px;
    display: flex;
    justify-content: center;
}

.form-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
}

button {
    background-color: #f4ae2b;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
    <div class="logo">Smart Course Companion</div>

    <div class="nav-links">
        <a href="/instructorDashboard.html">Home</a>
        <a href="/InstructorCreateClassPage.html">Add a class</a>
        <a href="/index.html">Logout</a>
    </div>
</div>

<!-- FORM -->
<div class="container">
    <div class="form-box">

        <h2>Create Course</h2>

        <input id="courseCode" placeholder="Course Code (ex: SOEN 287)">

        <select id="term">
            <option>Winter 2026</option>
            <option>Summer 2026</option>
            <option>Fall 2026</option>
        </select>

        <button onclick="createCourse()">Create</button>

    </div>
</div>

<script>
function createCourse() {

    const code = document.getElementById("courseCode").value.trim();
    const term = document.getElementById("term").value;

    if (!code) {
        alert("Enter course code");
        return;
    }

    fetch("/create-course", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            code: code,
            term: term
        })
    })
    .then(res => res.text())
    .then(data => {
        alert("Course created successfully!");
        window.location.href = "/instructorDashboard.html";
    })
    .catch(err => {
        console.error("ERROR:", err);
        alert("Error creating course");
    });
}
</script>

</body>
</html>
