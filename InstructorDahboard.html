<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    body {
  margin: 0;
  background: #e9eef7; 
  font-family: Arial, sans-serif;
}

/* NAV BAR */
#navigation {
  background: blue; /* keep your blue */
  border-bottom: 3px solid #000;
}

#navbar {
  margin: 0;
  padding: 10px 15px;
  list-style: none;
  overflow: hidden; /* helps with floats */
}

#nav-logo {
  float: left;
  margin-right: 12px;
}

#logo {
  height: 35px;
}

#nav-welcome {
  float: left;
  color: white;
  font-weight: bold;
  margin-top: 6px;
}

#nav-welcome p {
  margin: 0;
}

/* right side links */
.nav-right {
  float: right;
  margin-left: 20px;
  margin-top: 6px;
}

#navbar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}


#classes, #upcoming-assignments {
  width: 70%;
  margin: 40px auto;
}

#classes h1, #upcoming-assignments h1 {
  text-align: center;
  font-weight: bold;
}


#class-deck {
  border: 3px solid #000;
  padding: 25px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}


.course-box {
  background: #f3c1cf; 
  border: 3px solid #000;
  height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.course-box a {
  color: black;
  text-decoration: none;
}

</style>

</head>
<body>
    <body>

  <div id="navigation">
    <ul id="navbar">
      <li id="nav-logo">
        <a href="instructorDashboard2.html">
          <img src="logo.png" id="logo" alt="logo" />
        </a>
      </li>

     
      <li id="nav-welcome">
        <p id="welcome-message"></p>
      </li>

      
      <li class="nav-right"><a href="index.html">Logout</a></li>
      <li class="nav-right"><a href="InstructorManageAccountPage.html">Manage Account</a></li>
      <li class="nav-right"><a href="InstructorCreateClassPage.html">Create Class</a></li>
    </ul>
  </div>

  
  <div id="classes">
    <h1>Your Courses</h1>
    <div id="class-deck"></div>
  </div>

  <div id="upcoming-assignments">
    <h1>Upcoming Assignments</h1>
    <div id="assignment-deck"></div>
  </div>

  <script src="InstructorDashboard.js"></script>
</body>
    
</body>
</html>
