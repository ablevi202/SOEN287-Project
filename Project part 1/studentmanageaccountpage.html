<!DOCTYPE html>
<head>

    <meta charset="UTF-8">
    <title>Manage Account</title>

<style>
body {
	margin-top: 280px;
    font-family: Arial, sans-serif;
    background-color: #f7f3ee;
	display: flex;
	flex-wrap: wrap;
	justify-content: center;

}

.text{
	font-weight: normal;
}

.options {
	display: flex;
	justify-content: space-between;
	margin: 10px;
}

.titles {
	display: flex;
	justify-content: center;
}

.containers{
	width: 900px;
	padding: 10px;
	display: flex;
	flex-direction: column;
	border-radius: 15px;
	background-color: white;
	margin:20px;
	box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
}

#manageaccount {
	display: flex;
	justify-content: left;
	width: 1860px;
	margin-top: 20px;
}

.button{
	background-color: #f8a928;
	border-radius: 6px;
	border: none;
	font-size: 1rem;
	font-weight: 500;
	padding: 10px;
	cursor: pointer;
	color: #fff;
	transition: background-color 0.3s;
}

.button:hover{
	background-color: #d9921f;
}

#delete{
	background-color: red;
	border-radius: 6px;
	border: none;
	font-size: 1rem;
	font-weight: 500;
	padding: 10px;
	cursor: pointer;
	color: #fff;
	transition: background-color 0.3s;
}

#delete:hover{
	background-color: #A10500;
}



 
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    background-color: #ffffff;
    z-index: 1000;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    border-radius: 0 0 15px 15px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
}

.logo img {
    height: 40px;
    width: auto;
}

.logo h3 {
    margin: 0;
    color: black;
    font-size: 1.2rem;
}

.navbar ul {
    list-style: none;
}

.navbar .nav-links {
    display: flex;
    align-items: center;
    margin-right: 100px;
    gap: 5px;
}

.nav-link {
    text-decoration: none;
    color: black;
    padding: 15px 20px;
    display: inline-block;
    transition: background-color 0.3s;
}

.nav-link:hover {
    background-color: rgb(202, 201, 201);
}

.nav-link.active {
    background-color: #f8a928;
    color: white;
    font-weight: 600;
}

.nav-links img {
    height: 30px;
    width: 30px;
    border-radius: 50%;
}

</style>
</head>
<body>

<nav class = "navbar">

    <div class = "logo">
        <img src = "book.webp" alt = "Logo">
        <h3>Smart Course Companion</h3>
    </div>

    <ul class = "nav-links">
        <li><a href="studentDashboard.html" class="nav-link">Home</a></li>
        <li><a href="student-addclass.html" class="nav-link">Add a class</a></li>
        <li><a href="index.html" class="nav-link">Logout</a></li>
        <li><a href="studentmanageaccountpage.html"> <img src = "icon.webp" alt = "User Icon"></a></li>
    </ul>

</nav>
<div  id = "manageaccount">
	<h1>Manage Account</h1>
</div>
		<div class = "containers">
			<h2 class = "titles"> Details </h2>
			<div class = "options">
				<h3 class = "text" > Name: </h3>
				<button class = "button" type="button"> Change </button>
			</div>
			<div class = "options">
				<h3 class = "text"> Email: </h3>
				<button class = "button" type="button"> Change </button>
			</div>
			<div class = "options">
				<h3 class = "text"> Username: </h3>
				<button class = "button" type="button"> Change </button>
			</div>
		</div>
		<div class = "containers">
			<h2 class = "titles" > Security </h2>
			<div class = "options">
				<h3 class = "text"> Password: </h3>
				<button class = "button" type="button"> Change </button>
			</div>
			<div class = "options">
				<h3 class = "text"> Delete Account </h3>
				<button id = "delete" type="button"> Delete </button>
			</div>
		</div>
		
</body>
</html>
