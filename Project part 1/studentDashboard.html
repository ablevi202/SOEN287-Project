<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" href="studentDashboardStyle.css">
	</head>
	<body style="background-color:#fff5e6;">
		<nav class = "navbar">

			<div class = "logo">
				<img src = "book.webp" alt = "Logo">
				<h3>Smart Course Companion</h3>
			</div>

			<ul class = "nav-links">
				<li><a href="studentDashboard.html" class="nav-link">Home</a></li>
				<li><a href="student-addclass.html" class="nav-link">Add a class</a></li>
			        <li><a href="index.html" class="nav-link">Logout</a></li>
				<li><a href="studentmanageaccountpage.html"> <img src = "icon.webp" alt = "User Icon"></a></li>
			</ul>
		</nav>
		
		<div id="classes">
			<h1 style="font-family:arial; font-weight:bold; text-align:center;">Your Enrolled Classes</h1>
			<div id="class-deck"></div>
		</div>

		<div id="upcoming-assignments">
			<h1 style="font-family:arial; font-weight:bold; text-align:center;">Upcoming Assignments</h1>
			<div id="assignment-deck"></div>
		</div>

		<script>
			

			let class1 = new Object({
				objectName: "class1",
				name: "Soen 287",
				instructor: "Joe",
				assignments: [],
				courseAvg: 97.6,
				courseAverages: [95, 96, 97, 96, 93, 90, 92, 93, 95, 97.6]
			});
    
			let class2 = new Object({
				objectName: "class2",
				name: "Comp 345",
				instructor: "Joe",
				assignments: [],
				courseAvg: 98.9,
				courseAverages: [99, 96, 97, 98, 99, 98, 95, 91, 92, 95, 98.9]
			});

			let class3 = new Object({
				objectName: "class3",
				name: "Comp 331",
				instructor: "Joe",
				assignments: [],
				courseAvg: 71.5,
				courseAverages: [100, 98, 97, 98, 93, 81, 82, 84, 76, 70, 65, 71.5]
			});

				
			let class4 = new Object({
				objectName: "class4",
				name: "Soen 481",
				instructor: "Joe",
				assignments: [],
				courseAvg: 91.2,
				courseAverages: [95, 98, 99, 94, 93, 90, 84, 87, 86, 91.2]
			});
    
			const classes = [class1, class2, class3, class4];
			const y =  document.getElementById("class-deck");
    
			for(let i = 0; i < classes.length; i++){
				y.innerHTML += "<div onclick=\"openCoursePage(" + classes[i].objectName + ")\"><a href=\"studentClassPage.html\">" + classes[i].name + "</a></div>";
			}
    
			function openCoursePage(className){
				localStorage.setItem("className", JSON.stringify(className));
			}


			let assignment1 = new Object({
				dueDate: new Date(2026, 2, 27),
				name: "Assignment 1",
				className: "Soen 287"
			});
			class1.assignments.push(assignment1);

			let assignment2 = new Object({
				dueDate: new Date(2026, 3, 1),
				name: "Assignment 3",
				className: "Comp 331"
			});
			class3.assignments.push(assignment2);

			let assignment3 = new Object({
				dueDate: new Date(2026, 3, 1),
				name: "Assignment 2",
				className: "Soen 287"
			});
			class1.assignments.push(assignment3);

			let assignment4 = new Object({
				dueDate: new Date(2026, 3, 9),
				name: "Project",
				className: "Comp 345"
			});
			class2.assignments.push(assignment4);

			let assignment5 = new Object({
				dueDate: new Date(2026, 3, 12),
				name: "Theory Assignment 1",
				className: "Soen 481"
			});
			class4.assignments.push(assignment5);

			let assignments = [assignment1, assignment2, assignment3, assignment4, assignment5];
			const z = document.getElementById("assignment-deck");
				
			for(let i = 0; i < assignments.length; i++){
				let dueDateString = assignments[i].dueDate.toDateString().substring(0, 10);
				dueDateString = dueDateString.substring(0, 3) + "," + dueDateString.substring(3);
				z.innerHTML += "<div><h1 style=\"font-family:arial;\">" + dueDateString + "</h1><p style=\"font-family:arial;\">" + assignments[i].className + " - " + assignments[i].name + "</p></div>";
			}			
    
		</script>
	</body>
</html>
