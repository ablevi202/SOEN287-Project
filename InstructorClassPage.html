<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Management</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f3f1ee;
  color: #222;
}

.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 0 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  height: 40px;
}

.nav-links {
  display: flex;
  gap: 10px;
  margin-right: 20px;
}

.nav-link {
  padding: 15px;
  text-decoration: none;
  color: black;
  border-radius: 8px;
  transition: all 0.2s ease;
}

.nav-link:hover {
  background: #f4ae2b;
  color: white;
}

.page-wrapper {
  width: 60%;
  margin: auto;
  margin-top: 8rem;
}

.panel {
  background: white;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ccc;
  padding: 10px;
}

.btn {
  background: #f4ae2b;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
}

.delete-btn {
  background: #d9534f;
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 4px;
  cursor: pointer;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">
    <a href="instructorDashboard.html">
      <img src="images/book.webp" alt="logo">
    </a>
    <h3>Smart Course Companion</h3>
  </div>

  <div class="nav-links">
    <a href="instructorDashboard.html" class="nav-link">Home</a>
    <a href="InstructorCreateClassPage.html" class="nav-link">Add a class</a>
    <a href="index.html" class="nav-link">Logout</a>
  </div>
</nav>

<div class="page-wrapper">
  <div class="panel">
    <h1>Course Management</h1>
  </div>

  <div class="panel">
    <h2>Assessment Categories</h2>

    <table id="assessmentTable">
      <tr>
        <th>Name</th>
        <th>Weight</th>
        <th>Action</th>
      </tr>
    </table>

    <button class="btn" onclick="addAssessment()">Add Category</button>
  </div>

  <div class="panel">
    <h2>Add Grade</h2>

    <input id="studentId" placeholder="Student ID"><br><br>
    <input id="assessmentId" placeholder="Assessment ID"><br><br>
    <input id="earned" placeholder="Earned"><br><br>
    <input id="total" placeholder="Total"><br><br>

    <button class="btn" onclick="addGrade()">Add Grade</button>
  </div>

  <div class="panel">
    <h2>Get Student Average</h2>

    <input id="avgStudentId" placeholder="Student ID"><br><br>
    <button class="btn" onclick="getAverage()">Get Average</button>

    <p id="averageResult"></p>
  </div>
</div>

<script>
function getSelectedCourseId() {
  const courseId = localStorage.getItem("courseId");

  if (!courseId) {
    alert("No course selected");
    return null;
  }

  return courseId;
}

function loadAssessments() {
  const courseId = getSelectedCourseId();
  if (!courseId) return;

  fetch("/assessments/" + courseId)
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("assessmentTable");

      table.innerHTML = `
        <tr>
          <th>Name</th>
          <th>Weight</th>
          <th>Action</th>
        </tr>
      `;

      data.forEach(a => {
        table.innerHTML += `
          <tr>
            <td>${a.name}</td>
            <td>${a.weight}</td>
            <td>
              <button class="delete-btn" onclick="deleteAssessment(${a.id})">Delete</button>
            </td>
          </tr>
        `;
      });
    })
    .catch(err => console.error("LOAD ERROR:", err));
}

function addAssessment() {
  const courseId = getSelectedCourseId();
  if (!courseId) return;

  const name = prompt("Enter assessment name:");
  if (!name) return;

  const weight = prompt("Enter weight:");
  if (!weight) return;

  fetch("/create-assessment", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      course_id: courseId,
      name: name,
      weight: weight
    })
  })
  .then(res => res.text())
  .then(() => {
    alert("Category added!");
    loadAssessments();
  })
  .catch(err => {
    console.error("POST ERROR:", err);
    alert("Error adding category");
  });
}

function deleteAssessment(id) {
  if (!confirm("Delete this category?")) return;

  fetch("/delete-assessment", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id: id })
  })
  .then(res => res.text())
  .then(() => {
    alert("Deleted!");
    loadAssessments();
  })
  .catch(err => {
    console.error("DELETE ERROR:", err);
    alert("Error deleting category");
  });
}

function addGrade() {
  fetch("/add-grade", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      student_id: document.getElementById("studentId").value,
      assessment_id: document.getElementById("assessmentId").value,
      earned: document.getElementById("earned").value,
      total: document.getElementById("total").value
    })
  })
  .then(res => res.text())
  .then(() => alert("Grade added"))
  .catch(err => console.error("GRADE ERROR:", err));
}

function getAverage() {
  const courseId = getSelectedCourseId();
  if (!courseId) return;

  const studentId = document.getElementById("avgStudentId").value;

  fetch("/average/" + studentId + "/" + courseId)
    .then(res => res.json())
    .then(data => {
      document.getElementById("averageResult").innerText =
        "Average: " + data.average + "%";
    })
    .catch(err => console.error("AVG ERROR:", err));
}

loadAssessments();
</script>

</body>
</html>
