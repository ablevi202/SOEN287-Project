<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js"></script>


</head>

<body>

    <form class="LoginRegister-Form" onsubmit="return false;">
        <div class="form-container">
            
            <header class="LoginRegister-Header"> 
                <h2>Login</h2>
                  <hr/>
                <h3 class = "ErrorMessage" id = "loginError"></h3> 
            </header>

            <div class="form-group">
                <label for="Email">Email <span class="required">*</span></label>
                <input type="email" id="LoginEmail" class="Email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="Password">Password <span class="required">*</span></label>
                <input type="password" id="LoginPassword" class="Password" placeholder="Enter your password" required>
            </div>


            <button type="button" id="LoginButton" class="LoginRegisterButton" onclick="loginUser()">Login</button>

            <footer class="Footer-Login">
                New User ? <a href="register.html">Register</a>
            </footer>

            <div class="forgot-password">
                <a href="#">Forgot Password ?</a>
            </div>
        
        </div>
    </form>

    <div class="right-panel">
    

</body>







</html>
